name: arthatrack
description: "A new Flutter project."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ^3.1.0

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^8.0.2
  font_awesome_flutter: ^10.4.0
  fl_chart: ^1.2.0
  sqflite: ^2.3.0
  path: ^1.9.0
  http: ^1.2.1
  flutter_secure_storage: ^9.0.0
  sensors_plus: ^5.0.1
  geolocator: ^11.0.0
  provider: ^6.1.2
  crypto: ^3.0.3
  shared_preferences: ^2.2.2
  local_auth: ^2.2.0
  sqflite_common_ffi: ^2.4.0+2
  url_launcher: ^6.3.2
  google_generative_ai: ^0.4.7
  flutter_dotenv: ^6.0.0
  image_picker: ^1.2.1
  flutter_map: any
  latlong2: any
  flutter_local_notifications: ^21.0.0
  flutter_svg: ^2.2.4
  timezone: ^0.11.0
  flutter_markdown: ^0.7.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/dark_mode.png

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logo.png"
  adaptive_icon_background: "#121212"
  adaptive_icon_foreground: "assets/logo.png"

flutter_native_splash:
  color: "#121212"
  image: assets/dark_mode.png
  android_12:
    image: assets/dark_mode.png
    color: "#121212"
